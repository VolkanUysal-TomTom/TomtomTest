name: Release TomTom Tokens

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.5.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release & distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Configure git
        run: |
          git config user.name  "tomtom-ds-bot"
          git config user.email "ds-bot@tomtom.com"

      - name: Find last release tag
        id: last_tag
        run: |
          LAST=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1 || echo "")
          echo "tag=$LAST" >> $GITHUB_OUTPUT
          echo "Last tag: ${LAST:-none}"

      - name: Generate migration manifest
        run: |
          VERSION="${{ inputs.version }}"
          LAST="${{ steps.last_tag.outputs.tag }}"

          if [ -z "$LAST" ]; then
            echo "No previous tag — writing empty manifest"
            mkdir -p migration
            cat > "migration/v${VERSION}.json" <<JSON
          {
            "version": "${VERSION}",
            "changes": { "added": [], "renamed": [], "deprecated": [] }
          }
          JSON
          else
            python3 scripts/generate-manifest.py "$LAST" main --version "$VERSION"
          fi
          echo "Manifest written to migration/v${VERSION}.json"

      - name: Commit manifest
        run: |
          VERSION="${{ inputs.version }}"
          git add "migration/v${VERSION}.json"
          if git diff --staged --quiet; then
            echo "Manifest unchanged — nothing to commit"
          else
            git commit -m "chore: add migration manifest v${VERSION}"
            git push origin main
          fi

      - name: Package token files
        run: |
          VERSION="${{ inputs.version }}"
          zip -r "tomtom-base-tokens-v${VERSION}.zip" \
            tokens/1-Global \
            tokens/2-System \
            tokens/3-Component \
            "migration/v${VERSION}.json" \
            2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          NOTES="${{ inputs.release_notes }}"
          [ -z "$NOTES" ] && NOTES="Release v${VERSION}"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "$NOTES" \
            --target main \
            "tomtom-base-tokens-v${VERSION}.zip" \
            "migration/v${VERSION}.json"

      - name: Dispatch to all clients
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          version    = "${{ inputs.version }}"
          pat        = os.environ['RELEASE_PAT']
          owner      = "${{ github.repository_owner }}"
          repo       = "${{ github.event.repository.name }}"
          review_url = f"https://{owner}.github.io/{repo}/"

          with open('clients.json') as f:
              clients = json.load(f)

          if not clients:
              print("No clients registered in clients.json — nothing to dispatch")
              sys.exit(0)

          errors = []
          for client in clients:
              payload = json.dumps({
                  "event_type": "tomtom-token-release",
                  "client_payload": {
                      "version":      version,
                      "review_url":   review_url,
                      "tomtom_owner": owner,
                      "tomtom_repo":  repo,
                  }
              }).encode()

              req = urllib.request.Request(
                  f"https://api.github.com/repos/{client['owner']}/{client['repo']}/dispatches",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {pat}",
                      "Accept":        "application/vnd.github+json",
                      "Content-Type":  "application/json",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"✓ Dispatched to {client['name']} ({client['repo']})")
              except urllib.error.HTTPError as e:
                  msg = f"✗ Failed {client['name']}: HTTP {e.code} {e.reason}"
                  print(msg)
                  errors.append(msg)

          if errors:
              sys.exit(1)
          PYEOF
