name: Sync TomTom Base Tokens

# Triggered by TomTom's release workflow via repository_dispatch
on:
  repository_dispatch:
    types: [tomtom-token-release]

jobs:
  sync:
    name: Create token sync PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release variables
        id: vars
        run: |
          echo "VERSION=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          echo "BRANCH=sync/v${{ github.event.client_payload.version }}"  >> $GITHUB_OUTPUT
          echo "ZIP_URL=${{ github.event.client_payload.zip_url }}"        >> $GITHUB_OUTPUT
          echo "REVIEW_URL=${{ github.event.client_payload.review_url }}"  >> $GITHUB_OUTPUT

      - name: Create sync branch
        run: |
          git config user.name  "tomtom-ds-bot"
          git config user.email "ds-bot@tomtom.com"
          # Delete remote branch if it exists from a previous run
          git push origin --delete "${{ steps.vars.outputs.BRANCH }}" 2>/dev/null || true
          git checkout -b "${{ steps.vars.outputs.BRANCH }}"

      - name: Download and unpack new base tokens
        run: |
          curl -sL "${{ steps.vars.outputs.ZIP_URL }}" -o base-tokens.zip
          # Replace the tomtom-base folder with the new release contents
          rm -rf tokens/tomtom-base
          mkdir -p tokens/tomtom-base
          unzip -q base-tokens.zip -d _tmp_tokens
          # Move only the distributable layers
          for dir in "1-Global" "2-System" "3-Component"; do
            if [ -d "_tmp_tokens/tokens/$dir" ]; then
              cp -r "_tmp_tokens/tokens/$dir" "tokens/tomtom-base/$dir"
            fi
          done
          rm -rf _tmp_tokens base-tokens.zip

      - name: Commit updated base tokens
        id: commit
        run: |
          git add tokens/tomtom-base
          if git diff --staged --quiet; then
            echo "No changes to tomtom-base — base tokens already up to date."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(tokens): update tomtom-base to v${{ steps.vars.outputs.VERSION }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          git push origin "${{ steps.vars.outputs.BRANCH }}"

      - name: Fetch migration manifest for PR description
        id: manifest
        if: steps.commit.outputs.changed == 'true'
        run: |
          MANIFEST=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.event.client_payload.tomtom_owner }}/${{ github.event.client_payload.tomtom_repo }}/contents/migration/v${{ steps.vars.outputs.VERSION }}.json" \
            | jq -r '.content' | base64 -d)
          ADDED=$(echo "$MANIFEST"    | jq -r '[.changes.added[]?.token]    | join("\n- ")' 2>/dev/null || echo "")
          RENAMED=$(echo "$MANIFEST"  | jq -r '[.changes.renamed[] | "\(.oldToken) → \(.newToken)"] | join("\n- ")' 2>/dev/null || echo "")
          DEPRECATED=$(echo "$MANIFEST" | jq -r '[.changes.deprecated[]?.token] | join("\n- ")' 2>/dev/null || echo "")
          {
            echo "ADDED<<EOF"
            echo "$ADDED"
            echo "EOF"
            echo "RENAMED<<EOF"
            echo "$RENAMED"
            echo "EOF"
            echo "DEPRECATED<<EOF"
            echo "$DEPRECATED"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create pull request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const added      = `${{ steps.manifest.outputs.ADDED }}`;
            const renamed    = `${{ steps.manifest.outputs.RENAMED }}`;
            const deprecated = `${{ steps.manifest.outputs.DEPRECATED }}`;

            const addedSection      = added      ? `### New tokens — assign values in the review tool\n- ${added}`           : '';
            const renamedSection    = renamed    ? `### Renamed tokens — update references\n- ${renamed}`                    : '';
            const deprecatedSection = deprecated ? `### Deprecated tokens — migrate before removal\n- ${deprecated}`        : '';

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `sync/v${{ steps.vars.outputs.VERSION }}`,
              base:  'main',
              title: `chore(tokens): sync TomTom base tokens to v${{ steps.vars.outputs.VERSION }}`,
              body: [
                `## TomTom Base Token Update — v${{ steps.vars.outputs.VERSION }}`,
                '',
                `The TomTom Design System has released a new token version.`,
                `This PR updates \`tokens/tomtom-base\` to v${{ steps.vars.outputs.VERSION }}.`,
                '',
                addedSection,
                renamedSection,
                deprecatedSection,
                '',
                '---',
                '_The designer review link will be posted as a comment below._',
              ].filter(Boolean).join('\n')
            });

            return pr.data.number;

      - name: Post review tool link as PR comment
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};
            const reviewUrl = '${{ steps.vars.outputs.REVIEW_URL }}'
              + `&pr=${prNumber}`
              + `&owner=${context.repo.owner}`
              + `&repo=${context.repo.repo}`
              + `&branch=sync%2Fv${{ steps.vars.outputs.VERSION }}`;

            await github.rest.issues.createComment({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              issue_number: prNumber,
              body:
                `## 🎨 Designer Review Required\n\n` +
                `TomTom has released **v${{ steps.vars.outputs.VERSION }}** with token changes ` +
                `that need your input.\n\n` +
                `### 👉 [Open Designer Review Tool](${reviewUrl})\n\n` +
                `In the review tool you can:\n` +
                `- Accept TomTom's default values as-is\n` +
                `- Set your own brand values for new tokens\n\n` +
                `Once you submit the review, merge this PR and pull from Token Studio.`
            });
