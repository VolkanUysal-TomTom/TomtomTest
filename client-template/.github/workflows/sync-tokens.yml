name: Sync TomTom Base Tokens

# Triggered by TomTom's release workflow via repository_dispatch
on:
  repository_dispatch:
    types: [tomtom-token-release]

jobs:
  sync:
    name: Create token sync PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release variables
        id: vars
        run: |
          echo "VERSION=${{ github.event.client_payload.version }}"           >> $GITHUB_OUTPUT
          echo "BRANCH=sync/v${{ github.event.client_payload.version }}"     >> $GITHUB_OUTPUT
          echo "REVIEW_URL=${{ github.event.client_payload.review_url }}"    >> $GITHUB_OUTPUT
          echo "tomtom_owner=${{ github.event.client_payload.tomtom_owner }}" >> $GITHUB_OUTPUT
          echo "tomtom_repo=${{ github.event.client_payload.tomtom_repo }}"   >> $GITHUB_OUTPUT

      - name: Create sync branch
        run: |
          # Delete remote branch if it exists from a previous run
          git push origin --delete "${{ steps.vars.outputs.BRANCH }}" 2>/dev/null || true
          git checkout -b "${{ steps.vars.outputs.BRANCH }}"

      - name: Configure git user
        run: |
          git config user.name  "tomtom-ds-bot"
          git config user.email "ds-bot@tomtom.com"

      - name: Fetch migration manifest
        id: manifest
        run: |
          curl -sL "https://raw.githubusercontent.com/${{ steps.vars.outputs.tomtom_owner }}/${{ steps.vars.outputs.tomtom_repo }}/main/migration/v${{ steps.vars.outputs.VERSION }}.json" -o /tmp/manifest.json

          echo "--- manifest.json contents ---"
          cat /tmp/manifest.json
          echo "--- end ---"

          echo "MANIFEST_PATH=/tmp/manifest.json" >> $GITHUB_ENV

          MANIFEST=$(cat /tmp/manifest.json)
          ADDED=$(echo "$MANIFEST"      | jq -r '[.changes.added[]?.token]    | join("\n- ")' 2>/dev/null || echo "")
          RENAMED=$(echo "$MANIFEST"    | jq -r '[.changes.renamed[] | "\(.oldToken) → \(.newToken)"] | join("\n- ")' 2>/dev/null || echo "")
          DEPRECATED=$(echo "$MANIFEST" | jq -r '[.changes.deprecated[]?.token] | join("\n- ")' 2>/dev/null || echo "")
          CHANGED=$(echo "$MANIFEST"    | jq -r '[.changes.changed[]?.token]   | join("\n- ")' 2>/dev/null || echo "")
          {
            echo "ADDED<<EOF"
            echo "$ADDED"
            echo "EOF"
            echo "RENAMED<<EOF"
            echo "$RENAMED"
            echo "EOF"
            echo "DEPRECATED<<EOF"
            echo "$DEPRECATED"
            echo "EOF"
            echo "CHANGED<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Apply token changes via Python script
        run: |
          cat > /tmp/apply_tokens.py << 'PYEOF'
          import json, os, sys

          def load_json(path):
              with open(path, 'r') as f:
                  return json.load(f)

          def save_json(path, data):
              with open(path, 'w') as f:
                  json.dump(data, f, indent=2, ensure_ascii=False)
                  f.write('\n')  # trailing newline

          def find_and_remove_token(data, token_name):
              """Recursively find and remove a token by key name"""
              if isinstance(data, dict):
                  if token_name in data and isinstance(data.get(token_name), dict) and 'value' in data[token_name]:
                      del data[token_name]
                      return True
                  for k, v in data.items():
                      if isinstance(v, dict) and find_and_remove_token(v, token_name):
                          return True
              return False

          def find_and_rename_token(data, old_name, new_name):
              """Recursively find and rename a token key, preserving its value"""
              if isinstance(data, dict):
                  if old_name in data and isinstance(data.get(old_name), dict) and 'value' in data[old_name]:
                      data[new_name] = data.pop(old_name)
                      return True
                  for k, v in data.items():
                      if isinstance(v, dict) and find_and_rename_token(v, old_name, new_name):
                          return True
              return False

          def remove_empty_groups(data):
              """Recursively remove empty dict values (leftover group shells after token removal)"""
              if not isinstance(data, dict):
                  return
              for key in list(data.keys()):
                  if isinstance(data[key], dict) and 'value' not in data[key]:
                      remove_empty_groups(data[key])
                      if not data[key]:
                          del data[key]

          def inject_token(data, group, token_name, token_def):
              """Inject token into the specified group path (supports nested paths with '/')"""
              current = data
              if group:
                  for level in group.split('/'):
                      if level not in current or not isinstance(current[level], dict):
                          current[level] = {}
                      current = current[level]
              current[token_name] = token_def

          def token_exists(data, token_name):
              """Check if a token key exists anywhere in the data"""
              if isinstance(data, dict):
                  if token_name in data and isinstance(data.get(token_name), dict) and 'value' in data[token_name]:
                      return True
                  for v in data.values():
                      if isinstance(v, dict) and token_exists(v, token_name):
                          return True
              return False

          with open(os.environ['MANIFEST_PATH'], 'r') as f:
              manifest = json.load(f)

          # Process DEPRECATED tokens first — must run before ADDED so that
          # tokens being re-injected at a new location are removed first
          for token in manifest.get('changes', {}).get('deprecated', []):
              token_name = token['token']
              for root_dir, dirs, files in os.walk('tokens'):
                  dirs[:] = [d for d in dirs if not d.startswith('$')]
                  for fname in files:
                      if not fname.endswith('.json') or fname.startswith('$'):
                          continue
                      fpath = os.path.join(root_dir, fname)
                      data = load_json(fpath)
                      if find_and_remove_token(data, token_name):
                          remove_empty_groups(data)
                          save_json(fpath, data)
                          print(f"  Removed {token_name} from {fpath}")

          # Process RENAMED tokens
          for token in manifest.get('changes', {}).get('renamed', []):
              old_name = token['oldToken']
              new_name = token['newToken']
              for root_dir, dirs, files in os.walk('tokens'):
                  dirs[:] = [d for d in dirs if not d.startswith('$')]
                  for fname in files:
                      if not fname.endswith('.json') or fname.startswith('$'):
                          continue
                      fpath = os.path.join(root_dir, fname)
                      data = load_json(fpath)
                      if find_and_rename_token(data, old_name, new_name):
                          save_json(fpath, data)
                          print(f"  Renamed {old_name} -> {new_name} in {fpath}")

          # Process ADDED tokens last — by this point deprecated/renamed are done
          for token in manifest.get('changes', {}).get('added', []):
              token_name = token['token']
              file_dir = token.get('file', '')  # e.g. "2-System/Colours"
              group = token.get('group', '')    # e.g. "POI Categories"

              for mode, mode_data in token.get('modes', {}).items():
                  file_path = f"tokens/{file_dir}/{mode}.json"
                  if not os.path.exists(file_path):
                      print(f"  Skipping {file_path} - file not found")
                      continue

                  data = load_json(file_path)

                  if token_exists(data, token_name):
                      print(f"  {token_name} already exists in {file_path}, skipping")
                      continue

                  token_def = {'value': mode_data['value'], 'type': token['type']}
                  if mode_data.get('description'):
                      token_def['description'] = mode_data['description']

                  inject_token(data, group, token_name, token_def)
                  save_json(file_path, data)
                  print(f"  Added {token_name} to {file_path}")

          # Final cleanup pass — remove any empty group shells left behind
          print("Running cleanup pass to remove empty groups...")
          for root_dir, dirs, files in os.walk('tokens'):
              dirs[:] = [d for d in dirs if not d.startswith('$')]
              for fname in files:
                  if not fname.endswith('.json') or fname.startswith('$'):
                      continue
                  fpath = os.path.join(root_dir, fname)
                  data = load_json(fpath)
                  before = json.dumps(data)
                  remove_empty_groups(data)
                  if json.dumps(data) != before:
                      save_json(fpath, data)
                      print(f"  Cleaned empty groups in {fpath}")
          PYEOF

          python3 /tmp/apply_tokens.py

      - name: Stage and check for changes
        id: commit
        run: |
          git add -A tokens/

          # Determine whether there are any changes to review — either tokens files were
          # mutated (added/renamed/deprecated), OR the manifest has `changed` entries
          # (value updates the designer may want to adopt — no file mutation needed).
          HAS_FILE_CHANGES=false
          if ! git diff --staged --quiet; then
            HAS_FILE_CHANGES=true
          fi

          HAS_CHANGED=$(jq -r '(.changes.changed // []) | length > 0' /tmp/manifest.json)

          if [ "$HAS_FILE_CHANGES" = "true" ]; then
            git commit -m "chore(tokens): apply v${{ steps.vars.outputs.VERSION }} token changes"
            git push origin "${{ steps.vars.outputs.BRANCH }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "$HAS_CHANGED" = "true" ]; then
            # No file diffs, but TomTom changed values on existing tokens — create an
            # empty commit so the PR exists and the designer can review via the tool.
            git commit --allow-empty -m "chore(tokens): review TomTom value updates for v${{ steps.vars.outputs.VERSION }}"
            git push origin "${{ steps.vars.outputs.BRANCH }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No token changes detected — files already up to date."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const added      = `${{ steps.manifest.outputs.ADDED }}`;
            const renamed    = `${{ steps.manifest.outputs.RENAMED }}`;
            const deprecated = `${{ steps.manifest.outputs.DEPRECATED }}`;
            const changed    = `${{ steps.manifest.outputs.CHANGED }}`;

            const addedList  = added.split('\n').filter(Boolean);
            const renList    = renamed.split('\n').filter(Boolean);
            const depList    = deprecated.split('\n').filter(Boolean);
            const chgList    = changed.split('\n').filter(Boolean);

            const cap = (arr, n = 20) => arr.length > n
              ? arr.slice(0, n).join('\n') + `\n- … and ${arr.length - n} more`
              : arr.join('\n');

            const addedSection      = addedList.length  ? `### New tokens (${addedList.length})\n${cap(addedList.map(t => `- ${t}`))}`   : '';
            const renamedSection    = renList.length     ? `### Renamed tokens (${renList.length})\n${cap(renList.map(t => `- ${t}`))}`   : '';
            const deprecatedSection = depList.length     ? `### Deprecated tokens (${depList.length})\n${cap(depList.map(t => `- ${t}`))}` : '';
            const changedSection    = chgList.length     ? `### TomTom value updates to review (${chgList.length})\nTomTom changed the value of these existing tokens. Your brand values are unchanged — the review tool lets you adopt TomTom's update per token.\n\n${cap(chgList.map(t => `- ${t}`))}` : '';

            const body = [
              `## TomTom Token Update — v${{ steps.vars.outputs.VERSION }}`,
              '',
              `The TomTom Design System has released a new token version.`,
              `This PR applies token changes from v${{ steps.vars.outputs.VERSION }}.`,
              '',
              addedSection,
              renamedSection,
              deprecatedSection,
              changedSection,
              '',
              '---',
              '_The designer review link will be posted as a comment below._',
            ].filter(Boolean).join('\n').slice(0, 60000);

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  `sync/v${{ steps.vars.outputs.VERSION }}`,
              base:  'main',
              title: `chore(tokens): sync TomTom tokens to v${{ steps.vars.outputs.VERSION }}`,
              body
            });

            return pr.data.number;

      - name: Post review tool link as PR comment
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.result }};
            const reviewUrl = '${{ steps.vars.outputs.REVIEW_URL }}'
              + `?version=${{ steps.vars.outputs.VERSION }}`
              + `&pr=${prNumber}`
              + `&owner=${context.repo.owner}`
              + `&repo=${context.repo.repo}`
              + `&branch=sync%2Fv${{ steps.vars.outputs.VERSION }}`
              + `&tomtom_owner=${{ steps.vars.outputs.tomtom_owner }}`
              + `&tomtom_repo=${{ steps.vars.outputs.tomtom_repo }}`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: prNumber,
              body:
                `## 🎨 Designer Review Required\n\n` +
                `TomTom has released **v${{ steps.vars.outputs.VERSION }}** with token changes ` +
                `that need your input.\n\n` +
                `### 👉 [Open Designer Review Tool](${reviewUrl})\n\n` +
                `In the review tool you can:\n` +
                `- Accept TomTom's default values as-is\n` +
                `- Set your own brand values for new tokens\n` +
                `- Reject tokens you don't want in your theme\n\n` +
                `Once you submit the review, merge this PR and pull from Token Studio.`
            });
